      function normalize(text) {
        return text
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");
      }

      function getScore(match) {
        if (match.homeGoals === undefined || match.awayGoals === undefined) {
          return '<span class="match-status">Pendiente</span>';
        }

        return `<strong class="match-score">${match.homeGoals} - ${match.awayGoals}</strong>`;
      }

      function getTeam(team, side) {
        const flag = flags[team];
        const flagImage = flag
          ? `<img class="match-flag" src="images/${flag}" alt="" />`
          : "";

        return `
          <span class="match-team match-team-${side}">
            ${side === "home" ? flagImage : ""}
            <span>${team}</span>
            ${side === "away" ? flagImage : ""}
          </span>
        `;
      }

      function render() {
        const selectedGroup = groupFilter.value;
        const search = normalize(teamFilter.value.trim());
        const filteredMatches = matches.filter((match) => {
          const sameGroup = !selectedGroup || match.group === selectedGroup;
          const teams = normalize(`${match.home} ${match.away}`);
          return sameGroup && (!search || teams.includes(search));
        });

        summary.textContent = `${filteredMatches.length} partidos encontrados`;
        list.innerHTML = "";

        if (filteredMatches.length === 0) {
          list.innerHTML = "<p>No hay partidos con esos filtros.</p>";
          return;
        }

        const groupedByDate = filteredMatches.reduce((dates, match) => {
          if (!dates.has(match.date)) {
            dates.set(match.date, []);
          }

          dates.get(match.date).push(match);
          return dates;
        }, new Map());

        groupedByDate.forEach((dateMatches, date) => {
          const section = document.createElement("section");
          section.className = "calendar-day";
          section.innerHTML = `<h2>${date}</h2>`;

          dateMatches.forEach((match) => {
            section.insertAdjacentHTML(
              "beforeend",
              `
                <article class="match-card">
                  <div class="match-meta">
                    <span>${match.group}</span>
                    <span>${match.time}</span>
                  </div>
                  <div class="match-teams">
                    ${getTeam(match.home, "home")}
                    ${getScore(match)}
                    ${getTeam(match.away, "away")}
                  </div>
                </article>
              `,
            );
          });

          list.append(section);
        });
      }

      [...new Set(matches.map((match) => match.group))].forEach((group) => {
        const option = document.createElement("option");
        option.value = group;
        option.textContent = group;
        groupFilter.append(option);
      });

      groupFilter.addEventListener("change", render);
      teamFilter.addEventListener("input", render);

      render();
    </script>
  </body>
</html>
