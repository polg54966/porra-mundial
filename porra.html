    <script>
      const form = document.getElementById("porra-form");
      const mensaje = document.getElementById("mensaje");
      const groups = [...document.querySelectorAll(".group")];

      function updateGroup(group) {
        const checkboxes = [
          ...group.querySelectorAll('input[type="checkbox"]'),
        ];
        const checked = checkboxes.filter((checkbox) => checkbox.checked);
        const firstCheckbox = checkboxes[0];
        const isComplete = checked.length === 2;

        checkboxes.forEach((checkbox) => {
          checkbox.disabled = !checkbox.checked && checked.length >= 2;
        });

        firstCheckbox.setCustomValidity(
          isComplete ? "" : "Marca exactamente 2 equipos en este grupo.",
        );

        group.classList.toggle(
          "group-error",
          checked.length > 0 && !isComplete,
        );
        group.classList.toggle("group-complete", isComplete);
      }

      function actualizarGoogleForms() {
        groups.forEach((group) => {
          const groupId = group.querySelector("h2").id;

          const equipos = [
            ...group.querySelectorAll('input[type="checkbox"]:checked'),
          ]
            .map((checkbox) =>
              checkbox
                .closest(".team-option")
                .querySelector("span")
                .textContent.trim(),
            )
            .join(" | ");

          const hidden = document.getElementById(`${groupId}-hidden`);

          if (hidden) {
            hidden.value = equipos;
          }
        });
      }

      groups.forEach((group) => {
        updateGroup(group);
        group.addEventListener("change", () => updateGroup(group));
      });

      form.addEventListener("submit", (event) => {
        groups.forEach(updateGroup);

        if (!form.checkValidity()) {
          event.preventDefault();
          mensaje.textContent =
            "Debes marcar exactamente 2 equipos por grupo y completar todos los campos obligatorios.";
          form.reportValidity();
          return;
        }

        actualizarGoogleForms();

        setTimeout(() => {
          mensaje.textContent = "Porra enviada correctamente.";
          form.reset();
          groups.forEach(updateGroup);
        }, 500);
      });
    </script>
